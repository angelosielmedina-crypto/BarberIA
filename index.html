<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Barbería Castillo - Reservar Cita</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>


<header class="header">

<img src="img/logo-barberia-castillo.jpeg" alt="Logo Barbería Castillo" class="logo">

<h1>Barbería Castillo</h1>

</header>



<div id="inicio" class="pantalla visible">

<div class="inspiracion">

"Un buen corte es el inicio de una gran confianza"

</div>

<input type="tel" id="loginTel" placeholder="Ingresa tu número de teléfono">

<br>

<button class="btn" onclick="login()">

Entrar

</button>

</div>



<div id="principal" class="pantalla">

<h2>Bienvenido a la Barbería</h2>

<button class="btn" onclick="mostrarPantalla('servicios')">

Reservar Cita

</button>

<h3>Tus citas</h3>

<div id="misCitas"></div>

</div>



<div id="servicios" class="pantalla">

<h2>Selecciona tus servicios</h2>


<label>

<input type="checkbox" value="Corte de cabello" onchange="toggleCortes(this)">

Corte de cabello

</label>



<div id="menuCortes" style="display:none;">


<div class="corte-opcion">

<img src="img/buzzcut.jpg" alt="Buzz Cut" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Buzz Cut - $100">

Buzz Cut - $100

</label>

</div>


<div class="corte-opcion">

<img src="img/clasico.jpg" alt="Clásico" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Clásico - $80">

Clásico - $80

</label>

</div>


<div class="corte-opcion">

<img src="img/escolar.jpg" alt="Escolar" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Escolar - $80">

Escolar - $80

</label>

</div>


<div class="corte-opcion">

<img src="img/highfade.jpg" alt="High Fade" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="High Fade - $100">

High Fade - $100

</label>

</div>


<div class="corte-opcion">

<img src="img/lowfade.jpg" alt="Low Fade" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Low Fade - $100">

Low Fade - $100

</label>

</div>


<div class="corte-opcion">

<img src="img/midfade.jpg" alt="Mid Fade" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Mid Fade - $100">

Mid Fade - $100

</label>

</div>


<div class="corte-opcion">

<img src="img/taperfade.jpg" alt="Taper Fade" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Taper Fade - $100">

Taper Fade - $100

</label>

</div>


<div class="corte-opcion">

<img src="img/mullet.png" alt="Mullet" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Mullet - $100">

Mullet - $100

</label>

</div>


<div class="corte-opcion">

<img src="img/taperconclasico.png" alt="Taper Fade con Clásico" class="img-corte">

<label>

<input type="radio" name="tipoCorte" value="Taper Fade con Clásico - $100">

Taper Fade con Clásico - $100

</label>

</div>


</div>



<div class="servicio">

<img src="img/tratamientofacial.jpg" alt="Limpieza facial">

<label>

<input type="checkbox" value="Limpieza facial - $80">

Limpieza facial - $80

</label>

</div>



<div class="servicio">

<img src="img/limpiezaceja.png" alt="Limpieza de ceja">

<label>

<input type="checkbox" value="Limpieza de ceja - $15">

Limpieza de ceja - $15

</label>

</div>



<div class="servicio">

<img src="img/limpiezabarba.jpg" alt="Limpieza de barba">

<label>

<input type="checkbox" value="Limpieza de barba - $25">

Limpieza de barba - $25

</label>

</div>



<button class="btn" onclick="guardarServicios()">

Continuar

</button>

</div>



<div id="fecha" class="pantalla">

<h2>Selecciona la fecha</h2>

<select id="selectFecha"></select>

<br>

<button class="btn" onclick="guardarFecha()">

Continuar

</button>

</div>



<div id="hora" class="pantalla">

<h2>Selecciona la hora</h2>

<select id="selectHora"></select>

<br>

<button class="btn" onclick="guardarHora()">

Continuar

</button>

</div>



<div id="datos" class="pantalla">

<h2>Datos personales</h2>

<div class="card-datos">

<input type="text" id="nombre" placeholder="Nombre completo">

<br>

<input type="tel" id="telefono" placeholder="Número de teléfono">

<br>

<button class="btn" onclick="guardarDatos()">

Continuar

</button>

</div>

</div>



<div id="resumen" class="pantalla">

<h2>Resumen de tu cita</h2>

<div id="detalleCita"></div>

<button class="btn" onclick="confirmarCita()">

Confirmar

</button>

</div>



<script src="script.js"></script>

</body>
</html>
